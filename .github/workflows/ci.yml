name: backend-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: beam0
          POSTGRES_PASSWORD: beam0
          POSTGRES_DB: beam0_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:      postgres://beam0:beam0@localhost:5432/beam0_test
      TEST_DATABASE_URL: postgres://beam0:beam0@localhost:5432/beam0_test
      REDIS_URL:         redis://localhost:6379
      JWT_SECRET:        ci-only-test-jwt-secret-do-not-use-in-prod!!
      ALLOW_MASTER_OTP:  "true"
      NODE_ENV:          test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Migrate (dry-run on a fresh DB)
        run: npm run migrate

      - name: Test
        run: npm test

  # Coolify deploys automatically via its GitHub App on every push to main.
  # No CI deploy job needed.
