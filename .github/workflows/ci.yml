name: backend-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: beam0
          POSTGRES_PASSWORD: beam0
          POSTGRES_DB: beam0_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:      postgres://beam0:beam0@localhost:5432/beam0_test
      TEST_DATABASE_URL: postgres://beam0:beam0@localhost:5432/beam0_test
      REDIS_URL:         redis://localhost:6379
      JWT_SECRET:        ci-only-test-jwt-secret-do-not-use-in-prod!!
      ALLOW_MASTER_OTP:  "true"
      NODE_ENV:          test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Migrate (dry-run on a fresh DB)
        run: npm run migrate

      - name: Test
        run: npm test

  deploy-backend:
    name: Deploy Backend to Coolify
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Requires a "production" environment configured in GitHub → Settings → Environments.
    # Add required reviewers there to enforce a manual approval gate before deploying.
    # Also disable Coolify's own git-push auto-deploy so this CI job is the only deploy path.
    environment: production
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -f -X POST \
            "http://178.105.234.189:8000/api/v1/deploy?uuid=c13tqxxi4wzxqitxytwx5non" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      # Requires a DEPLOY_SSH_KEY secret in GitHub (private key whose public
      # half is in root@178.105.234.189's authorized_keys).
      - name: Run migrations
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@178.105.234.189 \
            'docker exec $(docker ps --format "{{.Names}}" | grep c13tqxxi4wzxqitxytwx5non | head -1) npm run migrate'
