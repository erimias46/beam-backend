# Production compose for Hetzner — see documentation/12-hetzner-deployment.md
services:
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://beam0:${POSTGRES_PASSWORD}@postgres:5432/beam0
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - beam0_network
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beam0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: beam0
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beam0"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - beam0_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - beam0_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  beam0_network:
    driver: bridge
